name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest tests/ -v --tb=short

      - name: Verify paper report has three datasets
        run: python -c "import json; r=json.load(open('results/paper_experiment_report.json')); assert len(r['results'])==3, r['results']; print('OK: NASA, Oxford, CALCE')"

      - name: Verify setup script
        run: python scripts/verify_setup.py
